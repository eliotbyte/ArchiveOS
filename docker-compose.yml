services:
  core:
    build:
      context: .
      args:
        VITE_VAULT_NAME: default
        VITE_API_BASE: ""
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./config:/config
      - ${VAULT_PATH:-./vaults/default}:/vaults/default
    environment:
      ARCHIVEOS_CONFIG: /config
      ARCHIVEOS_LISTEN: 0.0.0.0:8080
      ARCHIVEOS_WEB_DIR: /usr/share/archiveos/web

  ytdlp-worker:
    build: ./worker-ytdlp
    restart: unless-stopped
    depends_on:
      - core
    volumes:
      - ${VAULT_PATH:-./vaults/default}:/vaults/default
    environment:
      CORE_URL: http://core:8080
      VAULT_NAME: default
      VAULT_PATH: /vaults/default
      YTDLP_UPDATE_ON_START: "1"
      YTDLP_AUTO_UPDATE: "1"
      YTDLP_UPDATE_INTERVAL_SECS: "86400"
      JOB_POLL_SECS: "5"
      JOB_LEASE_SECS: "600"

  thumbnail-worker:
    build: ./worker-thumbnail
    restart: unless-stopped
    depends_on:
      - core
    volumes:
      - ${VAULT_PATH:-./vaults/default}:/vaults/default
    environment:
      CORE_URL: http://core:8080
      VAULT_NAME: default
      VAULT_PATH: /vaults/default
      JOB_POLL_SECS: "5"
      JOB_LEASE_SECS: "600"
